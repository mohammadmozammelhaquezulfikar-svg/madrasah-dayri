name: Diary Notification Check

on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '15 10 * * *'
    - cron: '30 10 * * *'
    - cron: '45 10 * * *'
    - cron: '0 11 * * *'
    - cron: '15 11 * * *'
    - cron: '30 11 * * *'
    - cron: '45 11 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Notification mode (noon4 or 5pm)'
        required: false
        default: '5pm'

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin

      - name: Determine mode based on which cron triggered this run
        id: mode
        run: |
          echo "Triggering cron: ${{ github.event.schedule }}"
          SCHEDULE="${{ github.event.schedule }}"
          if [[ "$SCHEDULE" == "0 10 * * *" || "$SCHEDULE" == "15 10 * * *" || "$SCHEDULE" == "30 10 * * *" || "$SCHEDULE" == "45 10 * * *" ]]; then
            echo "mode=noon4" >> $GITHUB_OUTPUT
          else
            echo "mode=5pm" >> $GITHUB_OUTPUT
          fi

      - name: Run notification check (scheduled)
        if: github.event_name == 'schedule'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node check-diary-notify.js ${{ steps.mode.outputs.mode }}

      - name: Run notification check (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node check-diary-notify.js ${{ github.event.inputs.mode }}
